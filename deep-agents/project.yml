name: DeepAgents
options:
  bundleIdPrefix: com.deepagents
  deploymentTarget:
    macOS: "14.0"

targets:
  DeepAgents:
    type: application
    platform: macOS
    sources: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deepagents.app
        SWIFT_VERSION: "5.9"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: DeepAgents
        CFBundleDisplayName: DeepAgents
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSHighResolutionCapable: true
        LSMinimumSystemVersion: "14.0"
