name: NotionLite
options:
  bundleIdPrefix: com.notionlite
  deploymentTarget:
    macOS: "14.0"

targets:
  NotionLite:
    type: application
    platform: macOS
    sources: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notionlite.app
        SWIFT_VERSION: "5.9"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: NotionLite
        CFBundleDisplayName: NotionLite
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSHighResolutionCapable: true
        LSMinimumSystemVersion: "14.0"
